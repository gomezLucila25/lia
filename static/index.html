<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIA · Triage de mails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper: #f5f2ea;
      --paper-2: #efe9dc;
      --card: #fbf9f4;
      --ink: #22201b;
      --ink-soft: #6b6559;
      --line: #e0d9c9;
      --brand: #1f5c4d;      /* verde profundo */
      --brand-ink: #143f34;
      --rojo: #b23a2e;
      --rojo-bg: #f7e3df;
      --ambar: #a9721a;
      --ambar-bg: #f6ecd6;
      --verde: #2f7a52;
      --verde-bg: #dcefe0;
      --azul: #2a5b86;
      --azul-bg: #dde8f2;
      --neutro: #7a7466;
      --neutro-bg: #eee9dd;
      --shadow: 0 1px 2px rgba(34, 32, 27, .06), 0 8px 24px rgba(34, 32, 27, .05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(120% 80% at 100% 0%, #efeadd 0%, transparent 60%),
        var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    header.masthead {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 18px;
      margin-bottom: 8px;
    }
    .brand {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      line-height: .95;
      letter-spacing: -.02em;
      margin: 0;
    }
    .brand .lia {
      color: var(--brand);
      font-style: italic;
    }
    .tagline {
      font-family: "IBM Plex Mono", monospace;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--ink-soft);
      text-align: right;
      max-width: 190px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 26px 0 8px;
      flex-wrap: wrap;
    }
    button.cta {
      appearance: none;
      border: none;
      background: var(--brand);
      color: #f3f0e7;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 13px 26px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .12s ease, background .2s ease;
    }
    button.cta:hover:not(:disabled) { background: var(--brand-ink); transform: translateY(-1px); }
    button.cta:active:not(:disabled) { transform: translateY(0); }
    button.cta:disabled { opacity: .6; cursor: progress; }

    button.cta.secundario {
      background: transparent;
      color: var(--brand);
      border: 1.5px solid var(--brand);
      box-shadow: none;
    }
    button.cta.secundario:hover:not(:disabled) {
      background: var(--brand);
      color: #f3f0e7;
    }

    .status {
      font-family: "IBM Plex Mono", monospace;
      font-size: .8rem;
      color: var(--ink-soft);
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 7px;
      animation: pulse 1.1s infinite ease-in-out;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:.25;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }

    /* Banner de aviso de vencimientos */
    .aviso {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 20px;
      background: var(--ambar-bg);
      border: 1px solid #e6d6ad;
      border-left: 4px solid var(--ambar);
      border-radius: 12px;
      padding: 14px 18px;
    }
    .aviso.show { display: flex; }
    #aviso-texto {
      color: #7a5312;
      font-weight: 500;
      cursor: pointer;
    }
    #aviso-cerrar {
      border: none;
      background: transparent;
      color: #7a5312;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }

    /* Estado de error */
    .error-box {
      margin-top: 24px;
      background: var(--rojo-bg);
      border: 1px solid #e6c4bd;
      border-left: 4px solid var(--rojo);
      border-radius: 12px;
      padding: 18px 20px;
      display: none;
    }
    .error-box.show { display: block; }
    .error-box p { margin: 0 0 12px; color: #7c2b22; }
    .error-box button {
      appearance: none;
      border: 1px solid var(--rojo);
      background: transparent;
      color: var(--rojo);
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
    }
    .error-box button:hover { background: var(--rojo); color: #fff; }

    /* Resumen (hero) */
    section.hero {
      margin-top: 26px;
      background:
        radial-gradient(140% 120% at 0% 0%, #e7efe9 0%, transparent 55%),
        var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px 26px;
      box-shadow: var(--shadow);
    }
    .hero-titular {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: clamp(1.25rem, 3.5vw, 1.7rem);
      letter-spacing: -.01em;
      margin-bottom: 18px;
    }
    .tiles { display: flex; gap: 14px; flex-wrap: wrap; }
    .tile {
      flex: 1;
      min-width: 120px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tile .num {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: 2.1rem;
      line-height: 1;
      color: var(--brand);
    }
    .tile .lbl {
      font-family: "IBM Plex Mono", monospace;
      font-size: .68rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: .05em;
      line-height: 1.3;
    }
    .card.evento {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card.evento .ev-info { display: flex; align-items: center; gap: 10px; }
    .card.evento .ev-ico { font-size: 1.15rem; }

    /* Secciones */
    section.bloque { margin-top: 44px; }
    section.bloque.hidden { display: none; }
    .titulo {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 18px;
    }
    .titulo h2 {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -.01em;
      margin: 0;
    }
    .titulo .conteo {
      font-family: "IBM Plex Mono", monospace;
      font-size: .78rem;
      color: var(--ink-soft);
    }
    .titulo .regla {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 16px;
      align-items: start;
    }
    .card .h-titulo {
      font-weight: 600;
      font-size: 1.05rem;
      grid-column: 1;
    }
    .card .emisor {
      font-family: "IBM Plex Mono", monospace;
      font-size: .74rem;
      color: var(--ink-soft);
      grid-column: 1;
    }
    .card .detalle {
      grid-column: 1 / -1;
      color: var(--ink-soft);
      font-size: .95rem;
    }

    a.card {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform .12s ease, border-color .2s ease, box-shadow .2s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(34, 32, 27, .12);
    }
    a.card::after {
      content: "abrir en Gmail ↗";
      grid-column: 1 / -1;
      font-family: "IBM Plex Mono", monospace;
      font-size: .68rem;
      color: var(--brand);
      opacity: 0;
      transition: opacity .2s ease;
    }
    a.card:hover::after { opacity: .8; }

    .chip {
      grid-column: 2;
      grid-row: 1 / span 2;
      align-self: start;
      justify-self: end;
      font-family: "IBM Plex Mono", monospace;
      font-size: .72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 6px 11px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .chip.rojo   { background: var(--rojo-bg);   color: var(--rojo); }
    .chip.ambar  { background: var(--ambar-bg);  color: var(--ambar); }
    .chip.verde  { background: var(--verde-bg);  color: var(--verde); }
    .chip.azul   { background: var(--azul-bg);   color: var(--azul); }
    .chip.neutro { background: var(--neutro-bg); color: var(--neutro); }

    .vacio {
      color: var(--ink-soft);
      font-style: italic;
      font-size: .95rem;
    }

    /* Formulario de recordatorios */
    .form-rec {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .form-rec input {
      font-family: inherit;
      font-size: .95rem;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
    }
    .form-rec select {
      font-family: inherit;
      font-size: .95rem;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
    }
    .form-rec input[type="date"] { width: auto; }
    .form-rec input:focus, .form-rec select:focus { outline: 2px solid var(--brand); border-color: transparent; }
    .form-rec .concepto { flex: 1; min-width: 160px; }
    .form-rec .dia { width: 90px; }
    .form-rec .monto { width: 150px; }
    .form-rec button.cta { padding: 10px 20px; font-size: .95rem; }

    .card.recordatorio {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .card.recordatorio .fila {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card.recordatorio .info { display: flex; flex-direction: column; gap: 2px; }
    .card.recordatorio .right { display: flex; align-items: center; gap: 10px; }

    /* Comprobantes (Drive local) */
    .comprobantes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
    .comp {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: .78rem;
    }
    .comp a { color: var(--brand); text-decoration: none; }
    .comp a:hover { text-decoration: underline; }
    label.subir {
      cursor: pointer;
      font-size: .78rem;
      color: var(--brand);
      border: 1px dashed var(--brand);
      border-radius: 8px;
      padding: 5px 10px;
    }
    label.subir:hover { background: var(--azul-bg); }
    button.ver-historial {
      border: none;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: .72rem;
      padding: 5px 8px;
      border-radius: 8px;
    }
    button.ver-historial:hover { color: var(--brand); text-decoration: underline; }

    /* Follow-up */
    .card.followup { display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
    .card.followup .fila {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    button.gen-followup {
      appearance: none;
      border: 1.5px solid var(--brand);
      background: transparent;
      color: var(--brand);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
    }
    button.gen-followup:hover { background: var(--brand); color: #f3f0e7; }
    .draft-box {
      border-top: 1px dashed var(--line);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .draft-asunto { font-size: .9rem; }
    textarea.draft-cuerpo {
      width: 100%;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: .92rem;
      line-height: 1.5;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      resize: vertical;
    }
    textarea.draft-cuerpo:focus { outline: 2px solid var(--brand); border-color: transparent; }
    button.copiar-draft {
      align-self: flex-start;
      appearance: none;
      border: none;
      background: var(--brand);
      color: #f3f0e7;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
    }
    button.copiar-draft:hover { background: var(--brand-ink); }

    .rec-toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
    button.mini {
      appearance: none;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-family: inherit;
      font-size: .82rem;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
    }
    button.mini:hover { border-color: var(--brand); color: var(--brand); }
    button.borrar, button.editar {
      border: none;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 8px;
    }
    button.borrar:hover { background: var(--rojo-bg); color: var(--rojo); }
    button.editar:hover { background: var(--azul-bg); }

    button.toggle-pago {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
      font-size: .74rem;
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    button.toggle-pago:hover { border-color: var(--verde); color: var(--verde); }
    .card.recordatorio.ok { border-color: var(--verde-bg); background: linear-gradient(0deg, var(--verde-bg) 0%, var(--card) 60%); }

    /* Ruido colapsable */
    details.ruido {
      margin-top: 44px;
      border-top: 1px dashed var(--line);
      padding-top: 20px;
    }
    details.ruido summary {
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: .82rem;
      color: var(--ink-soft);
      list-style: none;
    }
    details.ruido summary::-webkit-details-marker { display: none; }
    details.ruido summary::before { content: "▸ "; }
    details.ruido[open] summary::before { content: "▾ "; }
    details.ruido ul {
      margin: 14px 0 0;
      padding-left: 20px;
      color: var(--ink-soft);
      font-size: .9rem;
    }

    footer.pie {
      margin-top: 64px;
      font-family: "IBM Plex Mono", monospace;
      font-size: .7rem;
      color: var(--ink-soft);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <h1 class="brand"><span class="lia">LIA</span> Mail&nbsp;Triage</h1>
      <div class="tagline">tu bandeja, ordenada por lo que vence primero</div>
    </header>

    <div class="actions">
      <button id="btn-resumen" class="cta">📋 Resumen</button>
      <button id="btn-analizar" class="cta secundario">Analizar mis mails</button>
      <button id="btn-busqueda" class="cta secundario">Búsqueda laboral</button>
      <button id="btn-recordatorios" class="cta secundario">Recordatorios</button>
      <span id="status" class="status" aria-live="polite"></span>
    </div>

    <div id="aviso" class="aviso" role="alert">
      <span id="aviso-texto"></span>
      <button id="aviso-cerrar" aria-label="Cerrar">×</button>
    </div>

    <div id="error-box" class="error-box">
      <p id="error-msg"></p>
      <button id="btn-reintentar">Reintentar</button>
    </div>

    <main id="resultado"></main>

    <footer class="pie">LIA lee tu Gmail en modo solo-lectura · corre local en tu máquina</footer>
  </div>

  <script>
    const btnResumen = document.getElementById("btn-resumen");
    const btn = document.getElementById("btn-analizar");
    const btnBusqueda = document.getElementById("btn-busqueda");
    const btnRecordatorios = document.getElementById("btn-recordatorios");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");
    const btnReintentar = document.getElementById("btn-reintentar");
    const resultado = document.getElementById("resultado");
    const aviso = document.getElementById("aviso");
    const avisoTexto = document.getElementById("aviso-texto");

    // --- Lógica de fechas (espeja parser.dias_restantes en Python) ---
    function diasRestantes(fechaIso) {
      if (!fechaIso) return null;
      const partes = String(fechaIso).split("-");
      if (partes.length !== 3) return null;
      const [y, m, d] = partes.map(Number);
      if (!y || !m || !d) return null;
      const fecha = new Date(y, m - 1, d);
      if (isNaN(fecha)) return null;
      const hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      return Math.round((fecha - hoy) / 86400000);
    }

    function chipVencimiento(v) {
      if (v.estado === "pagado") return { texto: "pagado ✓", clase: "verde" };
      const d = diasRestantes(v.fecha);
      if (d === null) return { texto: "sin fecha", clase: "neutro" };
      if (d < 0) return { texto: `venció hace ${Math.abs(d)}d`, clase: "rojo" };
      if (d === 0) return { texto: "vence HOY", clase: "rojo" };
      if (d === 1) return { texto: "vence MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function ordenarVencimientos(items) {
      // Por días restantes ascendente (vencidos primero); sin fecha al final.
      return [...items].sort((a, b) => {
        const da = diasRestantes(a.fecha);
        const db = diasRestantes(b.fecha);
        const ka = da === null ? Infinity : da;
        const kb = db === null ? Infinity : db;
        return ka - kb;
      });
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    // ---------- Links a Gmail ----------
    let refLink = {};      // ref (número de mail) -> link directo a la conversación
    let authuserQS = "";   // "authuser=tu-email" para fijar SIEMPRE tu cuenta

    function setFuentes(data) {
      refLink = {};
      authuserQS = "";
      (data._fuentes || []).forEach((f) => {
        if (f.link) refLink[f.ref] = f.link;
      });
      // Tomo la cuenta autenticada del primer link (todos apuntan a la misma).
      const primero = (data._fuentes || []).find((f) => f.link);
      if (primero) {
        const m = /[?&]authuser=([^#&]+)/.exec(primero.link);
        if (m) authuserQS = "authuser=" + m[1];
      }
    }

    // Devuelve el mejor link posible para un item, SIEMPRE en tu cuenta:
    //  - si la IA marcó "ref" y tenemos el link exacto, va a ESE mail;
    //  - si no, abre Gmail buscando por remitente/empresa/título.
    function linkMail(item) {
      if (item.ref && refLink[item.ref]) return refLink[item.ref];
      const q = item.emisor || item.empresa || item.titulo || item.puesto || "";
      const qs = authuserQS ? "?" + authuserQS : "";
      return "https://mail.google.com/mail/u/0/" + qs + "#search/" + encodeURIComponent(q);
    }

    function cardVencimiento(v) {
      const chip = chipVencimiento(v);
      const cuerpo = `
          <div class="h-titulo">${esc(v.titulo)}</div>
          <div class="emisor">${esc(v.emisor)}${v.origen === "recordatorio" ? " 🔁" : ""}</div>
          <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
          <div class="detalle">${esc(v.detalle)}</div>`;
      // Los recordatorios fijos no vienen de un mail: tarjeta simple, sin link.
      if (v.origen === "recordatorio") {
        return `<article class="card">${cuerpo}</article>`;
      }
      return `<a class="card" href="${esc(linkMail(v))}" target="_blank" rel="noopener">${cuerpo}</a>`;
    }

    function cardSimple(item) {
      return `
        <a class="card" href="${esc(linkMail(item))}" target="_blank" rel="noopener">
          <div class="h-titulo">${esc(item.titulo)}</div>
          <div class="emisor">${esc(item.emisor)}</div>
          <div class="detalle">${esc(item.detalle)}</div>
        </a>`;
    }

    function bloque(titulo, conteo, cuerpo) {
      return `
        <section class="bloque">
          <div class="titulo">
            <h2>${titulo}</h2>
            <span class="conteo">${conteo}</span>
            <span class="regla"></span>
          </div>
          ${cuerpo}
        </section>`;
    }

    function render(data) {
      setFuentes(data);
      const venc = ordenarVencimientos(data.vencimientos || []);
      const accion = data.accion || [];
      const info = data.informativo || [];

      const vencHtml = venc.length
        ? venc.map(cardVencimiento).join("")
        : `<p class="vacio">Nada por vencer. Respirá.</p>`;

      const accionHtml = accion.length
        ? accion.map(cardSimple).join("")
        : `<p class="vacio">Nada que requiera acción.</p>`;

      const infoHtml = info.length
        ? info.map(cardSimple).join("")
        : `<p class="vacio">Sin novedades para mostrar.</p>`;

      const ruidoCount = data.ruido_count ?? 0;
      const ejemplos = data.ruido_ejemplos || [];
      const ruidoHtml = `
        <details class="ruido">
          <summary>Ruido descartado (${ruidoCount})</summary>
          ${
            ejemplos.length
              ? `<ul>${ejemplos.map((e) => `<li>${esc(e)}</li>`).join("")}</ul>`
              : ``
          }
        </details>`;

      resultado.innerHTML =
        bloque("Vencimientos", `${venc.length} · lo que corre reloj`, vencHtml) +
        bloque("Requiere acción", `${accion.length}`, accionHtml) +
        bloque("Informativo", `${info.length}`, infoHtml) +
        ruidoHtml;
    }

    // ---------- Resumen ----------
    function cuandoTexto(fecha) {
      const d = diasRestantes(fecha);
      if (d === null) return "sin fecha";
      if (d < 0) return `hace ${Math.abs(d)} días`;
      if (d === 0) return "hoy";
      if (d === 1) return "mañana";
      if (d <= 6) {
        const nombres = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];
        const [y, m, dd] = String(fecha).split("-").map(Number);
        return "el " + nombres[new Date(y, m - 1, dd).getDay()];
      }
      return `en ${d} días`;
    }

    function cardResumenItem(e) {
      const icono = e.tipo === "entrevista" ? "💼" : e.origen === "recordatorio" ? "🔁" : "💸";
      const clase = e.dias <= 1 ? "rojo" : e.dias <= 5 ? "ambar" : "neutro";
      return `
        <article class="card evento">
          <div class="ev-info"><span class="ev-ico">${icono}</span><span>${esc(e.titulo)}</span></div>
          <span class="chip ${clase}">${esc(cuandoTexto(e.fecha))}</span>
        </article>`;
    }

    function renderResumen(data) {
      const venc = data.vencimientos_semana || [];
      const ents = data.entrevistas || [];
      const pend = data.pendientes_count || 0;

      const partes = [];
      if (venc.length) partes.push(`${venc.length} ${venc.length === 1 ? "vencimiento" : "vencimientos"}`);
      if (ents.length) partes.push(`${ents.length} ${ents.length === 1 ? "entrevista" : "entrevistas"}`);
      if (pend) partes.push(`${pend} ${pend === 1 ? "pendiente" : "pendientes"} de laburo`);
      const titular = partes.length
        ? "Esta semana: " + partes.join(" · ")
        : "Semana tranquila, nada urgente 🌿";

      const eventos = [
        ...venc.map((v) => ({ tipo: "pago", titulo: v.titulo, fecha: v.fecha, dias: v.dias, origen: v.origen })),
        ...ents.map((e) => ({ tipo: "entrevista", titulo: e.titulo, fecha: e.fecha, dias: e.dias })),
      ]
        .filter((e) => e.dias !== null)
        .sort((a, b) => a.dias - b.dias);

      const filas = eventos.length
        ? eventos.map(cardResumenItem).join("")
        : `<p class="vacio">Nada agendado para los próximos días.</p>`;

      const hero = `
        <section class="hero">
          <div class="hero-titular">${esc(titular)}</div>
          <div class="tiles">
            <div class="tile"><span class="num">${venc.length}</span><span class="lbl">vencimientos<br>esta semana</span></div>
            <div class="tile"><span class="num">${ents.length}</span><span class="lbl">entrevistas<br>próximas</span></div>
            <div class="tile"><span class="num">${pend}</span><span class="lbl">pendientes<br>de laburo</span></div>
          </div>
        </section>`;

      resultado.innerHTML = hero + bloque("Lo que se viene", "ordenado por lo más cercano", filas);
    }

    // ---------- Modo búsqueda laboral ----------
    function chipEstado(p) {
      switch (p.estado) {
        case "oferta": return { texto: "¡oferta! 🎉", clase: "verde" };
        case "entrevista_agendada": return { texto: "entrevista", clase: "azul" };
        case "respondieron": return { texto: "te respondieron", clase: "azul" };
        case "rechazada": return { texto: "rechazada", clase: "rojo" };
        case "sin_respuesta": return { texto: "sin respuesta", clase: "ambar" };
        default: return { texto: "postulada", clase: "neutro" };
      }
    }

    function chipEntrevista(fecha) {
      const d = diasRestantes(fecha);
      if (d === null) return { texto: "a coordinar", clase: "azul" };
      if (d < 0) return { texto: `fue hace ${Math.abs(d)}d`, clase: "neutro" };
      if (d === 0) return { texto: "entrevista HOY", clase: "rojo" };
      if (d === 1) return { texto: "entrevista MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function cardPostulacion(p, chip, textoAbajo) {
      const titulo = `${esc(p.puesto)} — ${esc(p.empresa)}`;
      return `
        <a class="card" href="${esc(linkMail(p))}" target="_blank" rel="noopener">
          <div class="h-titulo">${titulo}</div>
          <div class="emisor">${esc(p.empresa)}</div>
          <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
          <div class="detalle">${esc(textoAbajo)}</div>
        </a>`;
    }

    let ultimaBusqueda = null;
    let editandoPostId = null;

    const ESTADOS_POST = [
      ["postulada", "Postulada"],
      ["respondieron", "Me respondieron"],
      ["entrevista_agendada", "Entrevista agendada"],
      ["oferta", "Oferta"],
      ["sin_respuesta", "Sin respuesta"],
      ["rechazada", "Rechazada"],
    ];

    function estadoSelectHtml(sel) {
      return (
        `<select class="estado-sel" name="estado">` +
        ESTADOS_POST.map(
          ([v, l]) => `<option value="${v}"${v === sel ? " selected" : ""}>${l}</option>`
        ).join("") +
        `</select>`
      );
    }

    function formPostHtml() {
      return `
        <form id="form-post" class="form-rec">
          <input class="concepto" name="empresa" placeholder="Empresa" />
          <input class="concepto" name="puesto" placeholder="Puesto" />
          ${estadoSelectHtml("postulada")}
          <input type="date" name="proxima_fecha" title="Fecha de entrevista (opcional)" />
          <input class="monto" name="detalle" placeholder="Nota (opcional)" />
          <button type="submit" class="cta">Agregar</button>
        </form>`;
    }

    function cardManual(p) {
      const chip = chipEstado(p);
      const sub = [
        p.detalle,
        p.pendiente ? "pendiente: " + p.pendiente : "",
        p.proxima_fecha ? "entrevista " + cuandoTexto(p.proxima_fecha) : "",
      ]
        .filter(Boolean)
        .join(" · ");
      return `
        <article class="card recordatorio">
          <div class="fila">
            <div class="info">
              <div class="h-titulo">${esc(p.puesto || "(sin puesto)")} — ${esc(p.empresa || "(sin empresa)")}</div>
              <div class="emisor">${esc(sub)}</div>
            </div>
            <div class="right">
              <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
              <button class="editar-post" data-id="${esc(p.id)}" title="Editar" aria-label="Editar">✏️</button>
              <button class="borrar-post" data-id="${esc(p.id)}" title="Borrar" aria-label="Borrar">✕</button>
            </div>
          </div>
        </article>`;
    }

    function cardEditarPost(p) {
      return `
        <article class="card recordatorio">
          <form class="form-rec" data-editpost="1" data-id="${esc(p.id)}">
            <input class="concepto" name="empresa" value="${esc(p.empresa)}" placeholder="Empresa" />
            <input class="concepto" name="puesto" value="${esc(p.puesto)}" placeholder="Puesto" />
            ${estadoSelectHtml(p.estado)}
            <input type="date" name="proxima_fecha" value="${esc(p.proxima_fecha || "")}" />
            <input class="monto" name="pendiente" value="${esc(p.pendiente || "")}" placeholder="Pendiente" />
            <input class="concepto" name="detalle" value="${esc(p.detalle || "")}" placeholder="Nota" />
            <button type="submit" class="cta">Guardar</button>
            <button type="button" class="mini cancelar-post-edit">Cancelar</button>
          </form>
        </article>`;
    }

    async function crudPost(url, method, body) {
      errorBox.classList.remove("show");
      const resp = await fetch(url, {
        method,
        headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
      return data.postulaciones || [];
    }

    function aplicarManual(lista) {
      if (!ultimaBusqueda) ultimaBusqueda = { postulaciones: [], manual: [] };
      ultimaBusqueda.manual = lista;
      renderBusqueda(ultimaBusqueda);
    }

    async function onAgregarPost(e) {
      e.preventDefault();
      const f = e.target;
      try {
        aplicarManual(
          await crudPost("/api/postulaciones", "POST", {
            empresa: f.empresa.value.trim(),
            puesto: f.puesto.value.trim(),
            estado: f.estado.value,
            proxima_fecha: f.proxima_fecha.value,
            detalle: f.detalle.value.trim(),
          })
        );
      } catch (err) {
        mostrarError(err.message || "No pude agregar la postulación.");
      }
    }

    async function onEditarPost(e) {
      e.preventDefault();
      const f = e.target;
      try {
        const lista = await crudPost(`/api/postulaciones/${f.dataset.id}`, "PUT", {
          empresa: f.empresa.value.trim(),
          puesto: f.puesto.value.trim(),
          estado: f.estado.value,
          proxima_fecha: f.proxima_fecha.value,
          pendiente: f.pendiente.value.trim(),
          detalle: f.detalle.value.trim(),
        });
        editandoPostId = null;
        aplicarManual(lista);
      } catch (err) {
        mostrarError(err.message || "No pude guardar los cambios.");
      }
    }

    async function borrarPost(id) {
      try {
        aplicarManual(await crudPost(`/api/postulaciones/${id}`, "DELETE", null));
      } catch (err) {
        mostrarError(err.message || "No pude borrar la postulación.");
      }
    }

    function cardFollowup(p) {
      return `
        <article class="card followup" data-empresa="${esc(p.empresa)}" data-puesto="${esc(p.puesto)}" data-detalle="${esc(p.detalle)}">
          <div class="fila">
            <div class="info">
              <div class="h-titulo">${esc(p.puesto)} — ${esc(p.empresa)}</div>
              <div class="emisor">${esc(p.detalle)}</div>
            </div>
            <button class="gen-followup">✍️ generar follow-up</button>
          </div>
          <div class="draft"></div>
        </article>`;
    }

    function renderBusqueda(data) {
      ultimaBusqueda = data;
      setFuentes(data);
      const posts = data.postulaciones || [];
      const activas = posts.filter((p) => p.estado !== "rechazada");
      const rechazos = posts.filter((p) => p.estado === "rechazada");
      const pendientes = posts.filter((p) => (p.pendiente || "").trim());
      const sinResp = posts.filter((p) => p.estado === "sin_respuesta");
      const entrevistas = posts
        .filter((p) => p.proxima_fecha || p.estado === "entrevista_agendada")
        .sort((a, b) => {
          const ka = diasRestantes(a.proxima_fecha);
          const kb = diasRestantes(b.proxima_fecha);
          return (ka === null ? Infinity : ka) - (kb === null ? Infinity : kb);
        });

      const entrevistasHtml = entrevistas.length
        ? entrevistas.map((p) => cardPostulacion(p, chipEntrevista(p.proxima_fecha), p.detalle)).join("")
        : `<p class="vacio">No hay entrevistas agendadas.</p>`;

      const pendientesHtml = pendientes.length
        ? pendientes.map((p) => cardPostulacion(p, { texto: "hacé esto", clase: "ambar" }, p.pendiente)).join("")
        : `<p class="vacio">Nada pendiente de tu lado. 👌</p>`;

      const activasHtml = activas.length
        ? activas.map((p) => cardPostulacion(p, chipEstado(p), p.detalle)).join("")
        : `<p class="vacio">Todavía no detecté postulaciones.</p>`;

      const rechazosHtml = `
        <details class="ruido">
          <summary>Te dijeron que no (${rechazos.length})</summary>
          ${
            rechazos.length
              ? rechazos.map((p) => `<a class="card" href="${esc(linkMail(p))}" target="_blank" rel="noopener"><div class="h-titulo">${esc(p.puesto)} — ${esc(p.empresa)}</div><div class="detalle">${esc(p.detalle)}</div></a>`).join("")
              : ``
          }
        </details>`;

      const followupHtml = sinResp.length
        ? sinResp.map(cardFollowup).join("")
        : `<p class="vacio">Ninguna postulación quedó sin respuesta. 🙌</p>`;

      const manuales = data.manual || [];
      const manualHtml =
        formPostHtml() +
        (manuales.length
          ? manuales
              .map((p) => (p.id === editandoPostId ? cardEditarPost(p) : cardManual(p)))
              .join("")
          : `<p class="vacio">Agregá arriba las que la IA no detectó.</p>`);

      resultado.innerHTML =
        bloque("Próximas entrevistas", `${entrevistas.length} · lo más cercano primero`, entrevistasHtml) +
        bloque("Te falta completar", `${pendientes.length}`, pendientesHtml) +
        bloque("Para hacer follow-up", `${sinResp.length} · sin respuesta`, followupHtml) +
        bloque("Postulaciones activas", `${activas.length}`, activasHtml) +
        bloque("Mis postulaciones (a mano)", `${manuales.length}`, manualHtml) +
        rechazosHtml;

      const fp = document.getElementById("form-post");
      if (fp) fp.addEventListener("submit", onAgregarPost);
      resultado
        .querySelectorAll("form[data-editpost]")
        .forEach((f) => f.addEventListener("submit", onEditarPost));
    }

    // ---------- Avisos de vencimiento (notificaciones) ----------
    function notificarEscritorio(urgentes) {
      if (!("Notification" in window)) return;
      const disparar = () => {
        urgentes.forEach((r) => {
          const key = `notif:${r.id}:${r.proxima}`;
          if (localStorage.getItem(key)) return; // ya avisado este ciclo
          const d = diasRestantes(r.proxima);
          const cuando = d < 0 ? "ya venció" : d === 0 ? "vence hoy" : "vence mañana";
          new Notification("LIA · vencimiento", {
            body: `${r.concepto} ${cuando}${r.monto ? " · " + r.monto : ""}`,
          });
          localStorage.setItem(key, "1");
        });
      };
      if (Notification.permission === "granted") disparar();
      else if (Notification.permission !== "denied")
        Notification.requestPermission().then((p) => p === "granted" && disparar());
    }

    function actualizarAviso(items) {
      const pend = (items || []).filter((r) => !r.pagado);
      const vencidos = [], hoy = [], manana = [];
      pend.forEach((r) => {
        const d = diasRestantes(r.proxima);
        if (d === null) return;
        if (d < 0) vencidos.push(r);
        else if (d === 0) hoy.push(r);
        else if (d === 1) manana.push(r);
      });
      const urgentes = [...vencidos, ...hoy, ...manana];
      if (!urgentes.length) {
        aviso.classList.remove("show");
        return;
      }
      const partes = [];
      if (hoy.length) partes.push(`Hoy: ${hoy.map((r) => r.concepto).join(", ")}`);
      if (manana.length) partes.push(`Mañana: ${manana.map((r) => r.concepto).join(", ")}`);
      if (vencidos.length) partes.push(`Vencido: ${vencidos.map((r) => r.concepto).join(", ")}`);
      avisoTexto.textContent = "🔔 " + partes.join("  ·  ");
      aviso.classList.add("show");
      notificarEscritorio(urgentes);
    }

    async function chequearVencimientos() {
      try {
        const resp = await fetch("/api/recordatorios");
        if (!resp.ok) return;
        const data = await resp.json();
        actualizarAviso(data.recordatorios || []);
      } catch {}
    }

    aviso.querySelector("#aviso-cerrar").addEventListener("click", () =>
      aviso.classList.remove("show")
    );
    avisoTexto.addEventListener("click", cargarRecordatorios);

    // ---------- Recordatorios fijos ----------
    let ultimosRecordatorios = { recordatorios: [] };
    let editandoId = null;

    function chipRecordatorio(r) {
      if (r.pagado) return { texto: "pagado ✓", clase: "verde" };
      const d = diasRestantes(r.proxima);
      if (d === null) return { texto: "—", clase: "neutro" };
      if (d === 0) return { texto: "vence HOY", clase: "rojo" };
      if (d === 1) return { texto: "vence MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function comprobantesHtml(r) {
      const items = (r.comprobantes || [])
        .map(
          (n) => `
          <span class="comp">
            <a href="/api/recordatorios/${r.id}/comprobantes/${encodeURIComponent(r.mes)}/${encodeURIComponent(n)}" target="_blank" rel="noopener">📄 ${esc(n)}</a>
            <button class="borrar-comp" data-id="${esc(r.id)}" data-mes="${esc(r.mes)}" data-nombre="${esc(n)}" title="Quitar">✕</button>
          </span>`
        )
        .join("");
      return `
        <div class="comprobantes">
          ${items}
          <label class="subir">📎 subir comprobante
            <input class="comp-input" type="file" data-id="${esc(r.id)}" hidden />
          </label>
          <button class="ver-historial" data-id="${esc(r.id)}">🗂 historial</button>
        </div>`;
    }

    function cardRecordatorio(r) {
      const chip = chipRecordatorio(r);
      const monto = r.monto ? ` · ${esc(r.monto)}` : "";
      const toggle = r.pagado
        ? `<button class="toggle-pago" data-id="${esc(r.id)}" data-pagado="1" title="Deshacer">↩ deshacer</button>`
        : `<button class="toggle-pago" data-id="${esc(r.id)}" data-pagado="0" title="Marcar como pagado">✓ pagué</button>`;
      return `
        <article class="card recordatorio${r.pagado ? " ok" : ""}">
          <div class="fila">
            <div class="info">
              <div class="h-titulo">${esc(r.concepto)}</div>
              <div class="emisor">todos los meses el día ${esc(r.dia)}${monto}</div>
            </div>
            <div class="right">
              <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
              ${toggle}
              <button class="editar" data-id="${esc(r.id)}" title="Editar" aria-label="Editar">✏️</button>
              <button class="borrar" data-id="${esc(r.id)}" title="Borrar" aria-label="Borrar">✕</button>
            </div>
          </div>
          ${comprobantesHtml(r)}
        </article>`;
    }

    function cardEditar(r) {
      return `
        <article class="card recordatorio">
          <form class="form-rec" data-edit="1" data-id="${esc(r.id)}">
            <input class="concepto" name="concepto" value="${esc(r.concepto)}" list="conceptos" required />
            <input class="dia" type="number" name="dia" min="1" max="31" value="${esc(r.dia)}" required />
            <input class="monto" name="monto" value="${esc(r.monto)}" placeholder="Monto (opcional)" />
            <button type="submit" class="cta">Guardar</button>
            <button type="button" class="mini cancelar-edit">Cancelar</button>
          </form>
        </article>`;
    }

    function formRecordatorioHtml() {
      return `
        <form id="form-rec" class="form-rec">
          <input class="concepto" name="concepto" list="conceptos" placeholder="Concepto (ej: Alquiler)" required />
          <datalist id="conceptos">
            <option value="Alquiler"></option><option value="Agua"></option>
            <option value="Luz"></option><option value="Gas"></option>
            <option value="ADT"></option><option value="Expensas"></option>
            <option value="Internet"></option><option value="Celular"></option>
            <option value="Prepaga"></option>
          </datalist>
          <input class="dia" type="number" name="dia" min="1" max="31" placeholder="Día" required />
          <input class="monto" name="monto" placeholder="Monto (opcional)" />
          <button type="submit" class="cta">Agregar</button>
        </form>`;
    }

    function renderRecordatorios(data) {
      ultimosRecordatorios = data;
      const items = data.recordatorios || [];
      actualizarAviso(items);
      const lista = items.length
        ? items.map((r) => (r.id === editandoId ? cardEditar(r) : cardRecordatorio(r))).join("")
        : `<p class="vacio">Todavía no cargaste recordatorios. Agregá el primero arriba 👆</p>`;
      const toolbar = `
        <div class="rec-toolbar">
          <button id="btn-exportar" class="mini">⬇ Exportar backup</button>
          <button id="btn-importar" class="mini">⬆ Importar backup</button>
          <input id="file-importar" type="file" accept="application/json,.json" hidden />
        </div>`;
      resultado.innerHTML = bloque(
        "Recordatorios fijos",
        `${items.length} · se repiten cada mes`,
        toolbar + formRecordatorioHtml() + lista
      );
      const form = document.getElementById("form-rec");
      if (form) form.addEventListener("submit", onAgregarRecordatorio);
      resultado
        .querySelectorAll("form[data-edit]")
        .forEach((f) => f.addEventListener("submit", onEditarRecordatorio));
    }

    async function onEditarRecordatorio(e) {
      e.preventDefault();
      const f = e.target;
      errorBox.classList.remove("show");
      try {
        const resp = await fetch(`/api/recordatorios/${f.dataset.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            concepto: f.concepto.value.trim(),
            dia: Number(f.dia.value),
            monto: f.monto.value.trim(),
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        editandoId = null;
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude guardar los cambios.");
      }
    }

    async function cargarRecordatorios() {
      ultimaAccion = cargarRecordatorios;
      errorBox.classList.remove("show");
      resultado.innerHTML = "";
      setCargando(true, "Cargando recordatorios…");
      try {
        const resp = await fetch("/api/recordatorios");
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (e) {
        mostrarError(e.message || "No pude cargar los recordatorios.");
      } finally {
        setCargando(false);
      }
    }

    async function onAgregarRecordatorio(e) {
      e.preventDefault();
      const f = e.target;
      errorBox.classList.remove("show");
      try {
        const resp = await fetch("/api/recordatorios", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            concepto: f.concepto.value.trim(),
            dia: Number(f.dia.value),
            monto: f.monto.value.trim(),
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude guardar el recordatorio.");
      }
    }

    async function borrarRecordatorio(id) {
      errorBox.classList.remove("show");
      try {
        const resp = await fetch(`/api/recordatorios/${id}`, { method: "DELETE" });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude borrar el recordatorio.");
      }
    }

    async function togglePago(id, pagado) {
      errorBox.classList.remove("show");
      try {
        const resp = await fetch(`/api/recordatorios/${id}/pagado`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pagado }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError("No pude actualizar el pago.");
      }
    }

    async function exportarRecordatorios() {
      try {
        const resp = await fetch("/api/recordatorios");
        const data = await resp.json();
        const limpio = (data.recordatorios || []).map((r) => ({
          concepto: r.concepto,
          dia: r.dia,
          monto: r.monto,
        }));
        const blob = new Blob([JSON.stringify(limpio, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "recordatorios-backup.json";
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        mostrarError("No pude exportar el backup.");
      }
    }

    async function importarRecordatorios(file) {
      errorBox.classList.remove("show");
      let items;
      try {
        items = JSON.parse(await file.text());
      } catch {
        mostrarError("Ese archivo no es un backup válido (no es JSON).");
        return;
      }
      try {
        const resp = await fetch("/api/recordatorios/importar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(items),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude importar el backup.");
      }
    }

    async function subirComprobante(id, file) {
      errorBox.classList.remove("show");
      try {
        const fd = new FormData();
        fd.append("archivo", file);
        const resp = await fetch(`/api/recordatorios/${id}/comprobantes`, {
          method: "POST",
          body: fd,
        });
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        await cargarRecordatorios();
      } catch (err) {
        mostrarError("No pude subir el comprobante.");
      }
    }

    async function borrarComprobante(id, mes, nombre) {
      try {
        const resp = await fetch(
          `/api/recordatorios/${id}/comprobantes/${encodeURIComponent(mes)}/${encodeURIComponent(nombre)}`,
          { method: "DELETE" }
        );
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        await cargarRecordatorios();
      } catch (err) {
        mostrarError("No pude borrar el comprobante.");
      }
    }

    function nombreMes(mes) {
      const [y, m] = String(mes).split("-").map(Number);
      const nombres = ["", "enero", "febrero", "marzo", "abril", "mayo", "junio",
        "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
      return `${nombres[m] || mes} ${y || ""}`.trim();
    }

    function renderHistorial(data) {
      const meses = data.meses || [];
      const filas = meses.length
        ? meses
            .map((m) => {
              const comps = (m.comprobantes || [])
                .map(
                  (n) => `<a class="comp" href="/api/recordatorios/${data.id}/comprobantes/${encodeURIComponent(m.mes)}/${encodeURIComponent(n)}" target="_blank" rel="noopener">📄 ${esc(n)}</a>`
                )
                .join("");
              const badge = m.pagado
                ? `<span class="chip verde">pagado ✓</span>`
                : `<span class="chip neutro">sin marcar</span>`;
              return `
                <article class="card recordatorio${m.pagado ? " ok" : ""}">
                  <div class="fila">
                    <div class="info"><div class="h-titulo">${esc(nombreMes(m.mes))}</div></div>
                    <div class="right">${badge}</div>
                  </div>
                  ${comps ? `<div class="comprobantes">${comps}</div>` : ""}
                </article>`;
            })
            .join("")
        : `<p class="vacio">Todavía no hay pagos registrados para este recordatorio.</p>`;

      resultado.innerHTML =
        `<div class="rec-toolbar"><button id="btn-volver" class="mini">← volver a recordatorios</button></div>` +
        bloque(
          `Historial · ${esc(data.concepto)}`,
          `${meses.length} ${meses.length === 1 ? "mes" : "meses"}`,
          filas
        );
    }

    async function verHistorial(id) {
      ultimaAccion = () => verHistorial(id);
      errorBox.classList.remove("show");
      resultado.innerHTML = "";
      setCargando(true, "Cargando historial…");
      try {
        const resp = await fetch(`/api/recordatorios/${id}/historial`);
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        renderHistorial(data);
      } catch (err) {
        mostrarError("No pude cargar el historial.");
      } finally {
        setCargando(false);
      }
    }

    async function generarFollowup(cardEl) {
      const draft = cardEl.querySelector(".draft");
      draft.innerHTML = `<p class="vacio">Escribiendo el borrador…</p>`;
      try {
        const resp = await fetch("/api/followup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            empresa: cardEl.dataset.empresa,
            puesto: cardEl.dataset.puesto,
            detalle: cardEl.dataset.detalle,
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        draft.innerHTML = `
          <div class="draft-box">
            <div class="draft-asunto"><strong>Asunto:</strong> ${esc(data.asunto)}</div>
            <textarea class="draft-cuerpo" rows="9">${esc(data.cuerpo)}</textarea>
            <button class="copiar-draft" data-asunto="${esc(data.asunto)}">📋 copiar mail</button>
          </div>`;
      } catch (err) {
        draft.innerHTML = `<p class="vacio">No pude generar el borrador: ${esc(err.message)}</p>`;
      }
    }

    function copiarDraft(btn) {
      const box = btn.closest(".draft-box");
      const asunto = btn.dataset.asunto || "";
      const cuerpo = box.querySelector(".draft-cuerpo").value;
      navigator.clipboard
        .writeText(`Asunto: ${asunto}\n\n${cuerpo}`)
        .then(() => {
          btn.textContent = "✓ copiado";
          setTimeout(() => (btn.textContent = "📋 copiar mail"), 1500);
        })
        .catch(() => mostrarError("No pude copiar (permiso del navegador)."));
    }

    // Listeners delegados (las tarjetas se re-dibujan, por eso van en el contenedor).
    resultado.addEventListener("click", (e) => {
      const gf = e.target.closest("button.gen-followup");
      if (gf) {
        e.preventDefault();
        generarFollowup(gf.closest(".card.followup"));
        return;
      }
      const cd = e.target.closest("button.copiar-draft");
      if (cd) {
        e.preventDefault();
        copiarDraft(cd);
        return;
      }
      const del = e.target.closest("button.borrar");
      if (del) {
        e.preventDefault();
        borrarRecordatorio(del.dataset.id);
        return;
      }
      const ed = e.target.closest("button.editar");
      if (ed) {
        e.preventDefault();
        editandoId = Number(ed.dataset.id);
        renderRecordatorios(ultimosRecordatorios);
        return;
      }
      const ce = e.target.closest("button.cancelar-edit");
      if (ce) {
        e.preventDefault();
        editandoId = null;
        renderRecordatorios(ultimosRecordatorios);
        return;
      }
      const ep = e.target.closest("button.editar-post");
      if (ep) {
        e.preventDefault();
        editandoPostId = Number(ep.dataset.id);
        renderBusqueda(ultimaBusqueda);
        return;
      }
      const bp = e.target.closest("button.borrar-post");
      if (bp) {
        e.preventDefault();
        borrarPost(bp.dataset.id);
        return;
      }
      const cpe = e.target.closest("button.cancelar-post-edit");
      if (cpe) {
        e.preventDefault();
        editandoPostId = null;
        renderBusqueda(ultimaBusqueda);
        return;
      }
      const delc = e.target.closest("button.borrar-comp");
      if (delc) {
        e.preventDefault();
        borrarComprobante(delc.dataset.id, delc.dataset.mes, delc.dataset.nombre);
        return;
      }
      const tp = e.target.closest("button.toggle-pago");
      if (tp) {
        e.preventDefault();
        togglePago(tp.dataset.id, tp.dataset.pagado !== "1");
        return;
      }
      const vh = e.target.closest("button.ver-historial");
      if (vh) {
        e.preventDefault();
        verHistorial(vh.dataset.id);
        return;
      }
      if (e.target.closest("#btn-volver")) {
        e.preventDefault();
        cargarRecordatorios();
        return;
      }
      if (e.target.closest("#btn-exportar")) {
        e.preventDefault();
        exportarRecordatorios();
        return;
      }
      if (e.target.closest("#btn-importar")) {
        e.preventDefault();
        const fi = document.getElementById("file-importar");
        if (fi) fi.click();
        return;
      }
    });

    resultado.addEventListener("change", (e) => {
      const fi = e.target.closest("#file-importar");
      if (fi && fi.files && fi.files[0]) {
        importarRecordatorios(fi.files[0]);
        return;
      }
      const ci = e.target.closest("input.comp-input");
      if (ci && ci.files && ci.files[0]) {
        subirComprobante(ci.dataset.id, ci.files[0]);
        return;
      }
    });

    // ---------- Motor común ----------
    function setCargando(cargando, etiqueta) {
      btnResumen.disabled = cargando;
      btn.disabled = cargando;
      btnBusqueda.disabled = cargando;
      btnRecordatorios.disabled = cargando;
      statusEl.innerHTML = cargando
        ? `<span class="dot"></span>${etiqueta}`
        : ``;
    }

    function mostrarError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add("show");
    }

    let ultimaAccion = null;

    async function correr(url, render, etiqueta) {
      ultimaAccion = () => correr(url, render, etiqueta);
      errorBox.classList.remove("show");
      resultado.innerHTML = "";
      setCargando(true, etiqueta);
      try {
        const resp = await fetch(url, { method: "POST" });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) {
          throw new Error(data.error || `Error ${resp.status}`);
        }
        render(data);
      } catch (e) {
        mostrarError(e.message || "Algo salió mal, reintentá.");
      } finally {
        setCargando(false);
      }
    }

    btnResumen.addEventListener("click", () =>
      correr("/api/resumen", renderResumen, "Armando tu resumen…")
    );
    btn.addEventListener("click", () =>
      correr("/api/analizar", render, "Leyendo Gmail y pensando…")
    );
    btnBusqueda.addEventListener("click", () =>
      correr("/api/busqueda", renderBusqueda, "Buscando tus postulaciones…")
    );
    btnRecordatorios.addEventListener("click", cargarRecordatorios);
    btnReintentar.addEventListener("click", () => ultimaAccion && ultimaAccion());

    // Al abrir: chequear si hay algo por vencer y avisar.
    chequearVencimientos();
  </script>
</body>
</html>
