<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIA · Triage de mails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper: #f5f2ea;
      --paper-2: #efe9dc;
      --card: #fbf9f4;
      --ink: #22201b;
      --ink-soft: #6b6559;
      --line: #e0d9c9;
      --brand: #1f5c4d;      /* verde profundo */
      --brand-ink: #143f34;
      --rojo: #b23a2e;
      --rojo-bg: #f7e3df;
      --ambar: #a9721a;
      --ambar-bg: #f6ecd6;
      --verde: #2f7a52;
      --verde-bg: #dcefe0;
      --azul: #2a5b86;
      --azul-bg: #dde8f2;
      --neutro: #7a7466;
      --neutro-bg: #eee9dd;
      --shadow: 0 1px 2px rgba(34, 32, 27, .06), 0 8px 24px rgba(34, 32, 27, .05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(120% 80% at 100% 0%, #efeadd 0%, transparent 60%),
        var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    header.masthead {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 18px;
      margin-bottom: 8px;
    }
    .brand {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      line-height: .95;
      letter-spacing: -.02em;
      margin: 0;
    }
    .brand .lia {
      color: var(--brand);
      font-style: italic;
    }
    .tagline {
      font-family: "IBM Plex Mono", monospace;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--ink-soft);
      text-align: right;
      max-width: 190px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 26px 0 8px;
      flex-wrap: wrap;
    }
    button.cta {
      appearance: none;
      border: none;
      background: var(--brand);
      color: #f3f0e7;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 13px 26px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .12s ease, background .2s ease;
    }
    button.cta:hover:not(:disabled) { background: var(--brand-ink); transform: translateY(-1px); }
    button.cta:active:not(:disabled) { transform: translateY(0); }
    button.cta:disabled { opacity: .6; cursor: progress; }

    button.cta.secundario {
      background: transparent;
      color: var(--brand);
      border: 1.5px solid var(--brand);
      box-shadow: none;
    }
    button.cta.secundario:hover:not(:disabled) {
      background: var(--brand);
      color: #f3f0e7;
    }

    .status {
      font-family: "IBM Plex Mono", monospace;
      font-size: .8rem;
      color: var(--ink-soft);
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 7px;
      animation: pulse 1.1s infinite ease-in-out;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:.25;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }

    /* Estado de error */
    .error-box {
      margin-top: 24px;
      background: var(--rojo-bg);
      border: 1px solid #e6c4bd;
      border-left: 4px solid var(--rojo);
      border-radius: 12px;
      padding: 18px 20px;
      display: none;
    }
    .error-box.show { display: block; }
    .error-box p { margin: 0 0 12px; color: #7c2b22; }
    .error-box button {
      appearance: none;
      border: 1px solid var(--rojo);
      background: transparent;
      color: var(--rojo);
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
    }
    .error-box button:hover { background: var(--rojo); color: #fff; }

    /* Secciones */
    section.bloque { margin-top: 44px; }
    section.bloque.hidden { display: none; }
    .titulo {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 18px;
    }
    .titulo h2 {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -.01em;
      margin: 0;
    }
    .titulo .conteo {
      font-family: "IBM Plex Mono", monospace;
      font-size: .78rem;
      color: var(--ink-soft);
    }
    .titulo .regla {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 16px;
      align-items: start;
    }
    .card .h-titulo {
      font-weight: 600;
      font-size: 1.05rem;
      grid-column: 1;
    }
    .card .emisor {
      font-family: "IBM Plex Mono", monospace;
      font-size: .74rem;
      color: var(--ink-soft);
      grid-column: 1;
    }
    .card .detalle {
      grid-column: 1 / -1;
      color: var(--ink-soft);
      font-size: .95rem;
    }

    a.card {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform .12s ease, border-color .2s ease, box-shadow .2s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(34, 32, 27, .12);
    }
    a.card::after {
      content: "abrir en Gmail ↗";
      grid-column: 1 / -1;
      font-family: "IBM Plex Mono", monospace;
      font-size: .68rem;
      color: var(--brand);
      opacity: 0;
      transition: opacity .2s ease;
    }
    a.card:hover::after { opacity: .8; }

    .chip {
      grid-column: 2;
      grid-row: 1 / span 2;
      align-self: start;
      justify-self: end;
      font-family: "IBM Plex Mono", monospace;
      font-size: .72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 6px 11px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .chip.rojo   { background: var(--rojo-bg);   color: var(--rojo); }
    .chip.ambar  { background: var(--ambar-bg);  color: var(--ambar); }
    .chip.verde  { background: var(--verde-bg);  color: var(--verde); }
    .chip.azul   { background: var(--azul-bg);   color: var(--azul); }
    .chip.neutro { background: var(--neutro-bg); color: var(--neutro); }

    .vacio {
      color: var(--ink-soft);
      font-style: italic;
      font-size: .95rem;
    }

    /* Formulario de recordatorios */
    .form-rec {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .form-rec input {
      font-family: inherit;
      font-size: .95rem;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
    }
    .form-rec input:focus { outline: 2px solid var(--brand); border-color: transparent; }
    .form-rec .concepto { flex: 1; min-width: 160px; }
    .form-rec .dia { width: 90px; }
    .form-rec .monto { width: 150px; }
    .form-rec button.cta { padding: 10px 20px; font-size: .95rem; }

    .card.recordatorio {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .card.recordatorio .fila {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card.recordatorio .info { display: flex; flex-direction: column; gap: 2px; }
    .card.recordatorio .right { display: flex; align-items: center; gap: 10px; }

    /* Comprobantes (Drive local) */
    .comprobantes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
    .comp {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: .78rem;
    }
    .comp a { color: var(--brand); text-decoration: none; }
    .comp a:hover { text-decoration: underline; }
    label.subir {
      cursor: pointer;
      font-size: .78rem;
      color: var(--brand);
      border: 1px dashed var(--brand);
      border-radius: 8px;
      padding: 5px 10px;
    }
    label.subir:hover { background: var(--azul-bg); }

    .rec-toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
    button.mini {
      appearance: none;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-family: inherit;
      font-size: .82rem;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
    }
    button.mini:hover { border-color: var(--brand); color: var(--brand); }
    button.borrar {
      border: none;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 8px;
    }
    button.borrar:hover { background: var(--rojo-bg); color: var(--rojo); }

    /* Ruido colapsable */
    details.ruido {
      margin-top: 44px;
      border-top: 1px dashed var(--line);
      padding-top: 20px;
    }
    details.ruido summary {
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: .82rem;
      color: var(--ink-soft);
      list-style: none;
    }
    details.ruido summary::-webkit-details-marker { display: none; }
    details.ruido summary::before { content: "▸ "; }
    details.ruido[open] summary::before { content: "▾ "; }
    details.ruido ul {
      margin: 14px 0 0;
      padding-left: 20px;
      color: var(--ink-soft);
      font-size: .9rem;
    }

    footer.pie {
      margin-top: 64px;
      font-family: "IBM Plex Mono", monospace;
      font-size: .7rem;
      color: var(--ink-soft);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <h1 class="brand"><span class="lia">LIA</span> Mail&nbsp;Triage</h1>
      <div class="tagline">tu bandeja, ordenada por lo que vence primero</div>
    </header>

    <div class="actions">
      <button id="btn-analizar" class="cta">Analizar mis mails</button>
      <button id="btn-busqueda" class="cta secundario">Búsqueda laboral</button>
      <button id="btn-recordatorios" class="cta secundario">Recordatorios</button>
      <span id="status" class="status" aria-live="polite"></span>
    </div>

    <div id="error-box" class="error-box">
      <p id="error-msg"></p>
      <button id="btn-reintentar">Reintentar</button>
    </div>

    <main id="resultado"></main>

    <footer class="pie">LIA lee tu Gmail en modo solo-lectura · corre local en tu máquina</footer>
  </div>

  <script>
    const btn = document.getElementById("btn-analizar");
    const btnBusqueda = document.getElementById("btn-busqueda");
    const btnRecordatorios = document.getElementById("btn-recordatorios");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");
    const btnReintentar = document.getElementById("btn-reintentar");
    const resultado = document.getElementById("resultado");

    // --- Lógica de fechas (espeja parser.dias_restantes en Python) ---
    function diasRestantes(fechaIso) {
      if (!fechaIso) return null;
      const partes = String(fechaIso).split("-");
      if (partes.length !== 3) return null;
      const [y, m, d] = partes.map(Number);
      if (!y || !m || !d) return null;
      const fecha = new Date(y, m - 1, d);
      if (isNaN(fecha)) return null;
      const hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      return Math.round((fecha - hoy) / 86400000);
    }

    function chipVencimiento(v) {
      if (v.estado === "pagado") return { texto: "pagado ✓", clase: "verde" };
      const d = diasRestantes(v.fecha);
      if (d === null) return { texto: "sin fecha", clase: "neutro" };
      if (d < 0) return { texto: `venció hace ${Math.abs(d)}d`, clase: "rojo" };
      if (d === 0) return { texto: "vence HOY", clase: "rojo" };
      if (d === 1) return { texto: "vence MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function ordenarVencimientos(items) {
      // Por días restantes ascendente (vencidos primero); sin fecha al final.
      return [...items].sort((a, b) => {
        const da = diasRestantes(a.fecha);
        const db = diasRestantes(b.fecha);
        const ka = da === null ? Infinity : da;
        const kb = db === null ? Infinity : db;
        return ka - kb;
      });
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    // ---------- Links a Gmail ----------
    let refLink = {};      // ref (número de mail) -> link directo a la conversación
    let authuserQS = "";   // "authuser=tu-email" para fijar SIEMPRE tu cuenta

    function setFuentes(data) {
      refLink = {};
      authuserQS = "";
      (data._fuentes || []).forEach((f) => {
        if (f.link) refLink[f.ref] = f.link;
      });
      // Tomo la cuenta autenticada del primer link (todos apuntan a la misma).
      const primero = (data._fuentes || []).find((f) => f.link);
      if (primero) {
        const m = /[?&]authuser=([^#&]+)/.exec(primero.link);
        if (m) authuserQS = "authuser=" + m[1];
      }
    }

    // Devuelve el mejor link posible para un item, SIEMPRE en tu cuenta:
    //  - si la IA marcó "ref" y tenemos el link exacto, va a ESE mail;
    //  - si no, abre Gmail buscando por remitente/empresa/título.
    function linkMail(item) {
      if (item.ref && refLink[item.ref]) return refLink[item.ref];
      const q = item.emisor || item.empresa || item.titulo || item.puesto || "";
      const qs = authuserQS ? "?" + authuserQS : "";
      return "https://mail.google.com/mail/u/0/" + qs + "#search/" + encodeURIComponent(q);
    }

    function cardVencimiento(v) {
      const chip = chipVencimiento(v);
      const cuerpo = `
          <div class="h-titulo">${esc(v.titulo)}</div>
          <div class="emisor">${esc(v.emisor)}${v.origen === "recordatorio" ? " 🔁" : ""}</div>
          <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
          <div class="detalle">${esc(v.detalle)}</div>`;
      // Los recordatorios fijos no vienen de un mail: tarjeta simple, sin link.
      if (v.origen === "recordatorio") {
        return `<article class="card">${cuerpo}</article>`;
      }
      return `<a class="card" href="${esc(linkMail(v))}" target="_blank" rel="noopener">${cuerpo}</a>`;
    }

    function cardSimple(item) {
      return `
        <a class="card" href="${esc(linkMail(item))}" target="_blank" rel="noopener">
          <div class="h-titulo">${esc(item.titulo)}</div>
          <div class="emisor">${esc(item.emisor)}</div>
          <div class="detalle">${esc(item.detalle)}</div>
        </a>`;
    }

    function bloque(titulo, conteo, cuerpo) {
      return `
        <section class="bloque">
          <div class="titulo">
            <h2>${titulo}</h2>
            <span class="conteo">${conteo}</span>
            <span class="regla"></span>
          </div>
          ${cuerpo}
        </section>`;
    }

    function render(data) {
      setFuentes(data);
      const venc = ordenarVencimientos(data.vencimientos || []);
      const accion = data.accion || [];
      const info = data.informativo || [];

      const vencHtml = venc.length
        ? venc.map(cardVencimiento).join("")
        : `<p class="vacio">Nada por vencer. Respirá.</p>`;

      const accionHtml = accion.length
        ? accion.map(cardSimple).join("")
        : `<p class="vacio">Nada que requiera acción.</p>`;

      const infoHtml = info.length
        ? info.map(cardSimple).join("")
        : `<p class="vacio">Sin novedades para mostrar.</p>`;

      const ruidoCount = data.ruido_count ?? 0;
      const ejemplos = data.ruido_ejemplos || [];
      const ruidoHtml = `
        <details class="ruido">
          <summary>Ruido descartado (${ruidoCount})</summary>
          ${
            ejemplos.length
              ? `<ul>${ejemplos.map((e) => `<li>${esc(e)}</li>`).join("")}</ul>`
              : ``
          }
        </details>`;

      resultado.innerHTML =
        bloque("Vencimientos", `${venc.length} · lo que corre reloj`, vencHtml) +
        bloque("Requiere acción", `${accion.length}`, accionHtml) +
        bloque("Informativo", `${info.length}`, infoHtml) +
        ruidoHtml;
    }

    // ---------- Modo búsqueda laboral ----------
    function chipEstado(p) {
      switch (p.estado) {
        case "oferta": return { texto: "¡oferta! 🎉", clase: "verde" };
        case "entrevista_agendada": return { texto: "entrevista", clase: "azul" };
        case "respondieron": return { texto: "te respondieron", clase: "azul" };
        case "rechazada": return { texto: "rechazada", clase: "rojo" };
        case "sin_respuesta": return { texto: "sin respuesta", clase: "ambar" };
        default: return { texto: "postulada", clase: "neutro" };
      }
    }

    function chipEntrevista(fecha) {
      const d = diasRestantes(fecha);
      if (d === null) return { texto: "a coordinar", clase: "azul" };
      if (d < 0) return { texto: `fue hace ${Math.abs(d)}d`, clase: "neutro" };
      if (d === 0) return { texto: "entrevista HOY", clase: "rojo" };
      if (d === 1) return { texto: "entrevista MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function cardPostulacion(p, chip, textoAbajo) {
      const titulo = `${esc(p.puesto)} — ${esc(p.empresa)}`;
      return `
        <a class="card" href="${esc(linkMail(p))}" target="_blank" rel="noopener">
          <div class="h-titulo">${titulo}</div>
          <div class="emisor">${esc(p.empresa)}</div>
          <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
          <div class="detalle">${esc(textoAbajo)}</div>
        </a>`;
    }

    function renderBusqueda(data) {
      setFuentes(data);
      const posts = data.postulaciones || [];
      const activas = posts.filter((p) => p.estado !== "rechazada");
      const rechazos = posts.filter((p) => p.estado === "rechazada");
      const pendientes = posts.filter((p) => (p.pendiente || "").trim());
      const entrevistas = posts
        .filter((p) => p.proxima_fecha || p.estado === "entrevista_agendada")
        .sort((a, b) => {
          const ka = diasRestantes(a.proxima_fecha);
          const kb = diasRestantes(b.proxima_fecha);
          return (ka === null ? Infinity : ka) - (kb === null ? Infinity : kb);
        });

      const entrevistasHtml = entrevistas.length
        ? entrevistas.map((p) => cardPostulacion(p, chipEntrevista(p.proxima_fecha), p.detalle)).join("")
        : `<p class="vacio">No hay entrevistas agendadas.</p>`;

      const pendientesHtml = pendientes.length
        ? pendientes.map((p) => cardPostulacion(p, { texto: "hacé esto", clase: "ambar" }, p.pendiente)).join("")
        : `<p class="vacio">Nada pendiente de tu lado. 👌</p>`;

      const activasHtml = activas.length
        ? activas.map((p) => cardPostulacion(p, chipEstado(p), p.detalle)).join("")
        : `<p class="vacio">Todavía no detecté postulaciones.</p>`;

      const rechazosHtml = `
        <details class="ruido">
          <summary>Te dijeron que no (${rechazos.length})</summary>
          ${
            rechazos.length
              ? rechazos.map((p) => `<a class="card" href="${esc(linkMail(p))}" target="_blank" rel="noopener"><div class="h-titulo">${esc(p.puesto)} — ${esc(p.empresa)}</div><div class="detalle">${esc(p.detalle)}</div></a>`).join("")
              : ``
          }
        </details>`;

      resultado.innerHTML =
        bloque("Próximas entrevistas", `${entrevistas.length} · lo más cercano primero`, entrevistasHtml) +
        bloque("Te falta completar", `${pendientes.length}`, pendientesHtml) +
        bloque("Postulaciones activas", `${activas.length}`, activasHtml) +
        rechazosHtml;
    }

    // ---------- Recordatorios fijos ----------
    function chipRecordatorio(proxima) {
      const d = diasRestantes(proxima);
      if (d === null) return { texto: "—", clase: "neutro" };
      if (d === 0) return { texto: "vence HOY", clase: "rojo" };
      if (d === 1) return { texto: "vence MAÑANA", clase: "rojo" };
      if (d <= 5) return { texto: `en ${d} días`, clase: "ambar" };
      return { texto: `en ${d} días`, clase: "neutro" };
    }

    function comprobantesHtml(r) {
      const items = (r.comprobantes || [])
        .map(
          (n) => `
          <span class="comp">
            <a href="/api/recordatorios/${r.id}/comprobantes/${encodeURIComponent(n)}" target="_blank" rel="noopener">📄 ${esc(n)}</a>
            <button class="borrar-comp" data-id="${esc(r.id)}" data-nombre="${esc(n)}" title="Quitar">✕</button>
          </span>`
        )
        .join("");
      return `
        <div class="comprobantes">
          ${items}
          <label class="subir">📎 subir comprobante
            <input class="comp-input" type="file" data-id="${esc(r.id)}" hidden />
          </label>
        </div>`;
    }

    function cardRecordatorio(r) {
      const chip = chipRecordatorio(r.proxima);
      const monto = r.monto ? ` · ${esc(r.monto)}` : "";
      return `
        <article class="card recordatorio">
          <div class="fila">
            <div class="info">
              <div class="h-titulo">${esc(r.concepto)}</div>
              <div class="emisor">todos los meses el día ${esc(r.dia)}${monto}</div>
            </div>
            <div class="right">
              <span class="chip ${chip.clase}">${esc(chip.texto)}</span>
              <button class="borrar" data-id="${esc(r.id)}" title="Borrar" aria-label="Borrar">✕</button>
            </div>
          </div>
          ${comprobantesHtml(r)}
        </article>`;
    }

    function formRecordatorioHtml() {
      return `
        <form id="form-rec" class="form-rec">
          <input class="concepto" name="concepto" list="conceptos" placeholder="Concepto (ej: Alquiler)" required />
          <datalist id="conceptos">
            <option value="Alquiler"></option><option value="Agua"></option>
            <option value="Luz"></option><option value="Gas"></option>
            <option value="ADT"></option><option value="Expensas"></option>
            <option value="Internet"></option><option value="Celular"></option>
            <option value="Prepaga"></option>
          </datalist>
          <input class="dia" type="number" name="dia" min="1" max="31" placeholder="Día" required />
          <input class="monto" name="monto" placeholder="Monto (opcional)" />
          <button type="submit" class="cta">Agregar</button>
        </form>`;
    }

    function renderRecordatorios(data) {
      const items = data.recordatorios || [];
      const lista = items.length
        ? items.map(cardRecordatorio).join("")
        : `<p class="vacio">Todavía no cargaste recordatorios. Agregá el primero arriba 👆</p>`;
      const toolbar = `
        <div class="rec-toolbar">
          <button id="btn-exportar" class="mini">⬇ Exportar backup</button>
          <button id="btn-importar" class="mini">⬆ Importar backup</button>
          <input id="file-importar" type="file" accept="application/json,.json" hidden />
        </div>`;
      resultado.innerHTML = bloque(
        "Recordatorios fijos",
        `${items.length} · se repiten cada mes`,
        toolbar + formRecordatorioHtml() + lista
      );
      const form = document.getElementById("form-rec");
      if (form) form.addEventListener("submit", onAgregarRecordatorio);
    }

    async function cargarRecordatorios() {
      ultimaAccion = cargarRecordatorios;
      errorBox.classList.remove("show");
      resultado.innerHTML = "";
      setCargando(true, "Cargando recordatorios…");
      try {
        const resp = await fetch("/api/recordatorios");
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (e) {
        mostrarError(e.message || "No pude cargar los recordatorios.");
      } finally {
        setCargando(false);
      }
    }

    async function onAgregarRecordatorio(e) {
      e.preventDefault();
      const f = e.target;
      errorBox.classList.remove("show");
      try {
        const resp = await fetch("/api/recordatorios", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            concepto: f.concepto.value.trim(),
            dia: Number(f.dia.value),
            monto: f.monto.value.trim(),
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude guardar el recordatorio.");
      }
    }

    async function borrarRecordatorio(id) {
      errorBox.classList.remove("show");
      try {
        const resp = await fetch(`/api/recordatorios/${id}`, { method: "DELETE" });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude borrar el recordatorio.");
      }
    }

    async function exportarRecordatorios() {
      try {
        const resp = await fetch("/api/recordatorios");
        const data = await resp.json();
        const limpio = (data.recordatorios || []).map((r) => ({
          concepto: r.concepto,
          dia: r.dia,
          monto: r.monto,
        }));
        const blob = new Blob([JSON.stringify(limpio, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "recordatorios-backup.json";
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        mostrarError("No pude exportar el backup.");
      }
    }

    async function importarRecordatorios(file) {
      errorBox.classList.remove("show");
      let items;
      try {
        items = JSON.parse(await file.text());
      } catch {
        mostrarError("Ese archivo no es un backup válido (no es JSON).");
        return;
      }
      try {
        const resp = await fetch("/api/recordatorios/importar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(items),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `Error ${resp.status}`);
        renderRecordatorios(data);
      } catch (err) {
        mostrarError(err.message || "No pude importar el backup.");
      }
    }

    async function subirComprobante(id, file) {
      errorBox.classList.remove("show");
      try {
        const fd = new FormData();
        fd.append("archivo", file);
        const resp = await fetch(`/api/recordatorios/${id}/comprobantes`, {
          method: "POST",
          body: fd,
        });
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        await cargarRecordatorios();
      } catch (err) {
        mostrarError("No pude subir el comprobante.");
      }
    }

    async function borrarComprobante(id, nombre) {
      try {
        const resp = await fetch(
          `/api/recordatorios/${id}/comprobantes/${encodeURIComponent(nombre)}`,
          { method: "DELETE" }
        );
        if (!resp.ok) throw new Error(`Error ${resp.status}`);
        await cargarRecordatorios();
      } catch (err) {
        mostrarError("No pude borrar el comprobante.");
      }
    }

    // Listeners delegados (las tarjetas se re-dibujan, por eso van en el contenedor).
    resultado.addEventListener("click", (e) => {
      const del = e.target.closest("button.borrar");
      if (del) {
        e.preventDefault();
        borrarRecordatorio(del.dataset.id);
        return;
      }
      const delc = e.target.closest("button.borrar-comp");
      if (delc) {
        e.preventDefault();
        borrarComprobante(delc.dataset.id, delc.dataset.nombre);
        return;
      }
      if (e.target.closest("#btn-exportar")) {
        e.preventDefault();
        exportarRecordatorios();
        return;
      }
      if (e.target.closest("#btn-importar")) {
        e.preventDefault();
        const fi = document.getElementById("file-importar");
        if (fi) fi.click();
        return;
      }
    });

    resultado.addEventListener("change", (e) => {
      const fi = e.target.closest("#file-importar");
      if (fi && fi.files && fi.files[0]) {
        importarRecordatorios(fi.files[0]);
        return;
      }
      const ci = e.target.closest("input.comp-input");
      if (ci && ci.files && ci.files[0]) {
        subirComprobante(ci.dataset.id, ci.files[0]);
        return;
      }
    });

    // ---------- Motor común ----------
    function setCargando(cargando, etiqueta) {
      btn.disabled = cargando;
      btnBusqueda.disabled = cargando;
      btnRecordatorios.disabled = cargando;
      statusEl.innerHTML = cargando
        ? `<span class="dot"></span>${etiqueta}`
        : ``;
    }

    function mostrarError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add("show");
    }

    let ultimaAccion = null;

    async function correr(url, render, etiqueta) {
      ultimaAccion = () => correr(url, render, etiqueta);
      errorBox.classList.remove("show");
      resultado.innerHTML = "";
      setCargando(true, etiqueta);
      try {
        const resp = await fetch(url, { method: "POST" });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) {
          throw new Error(data.error || `Error ${resp.status}`);
        }
        render(data);
      } catch (e) {
        mostrarError(e.message || "Algo salió mal, reintentá.");
      } finally {
        setCargando(false);
      }
    }

    btn.addEventListener("click", () =>
      correr("/api/analizar", render, "Leyendo Gmail y pensando…")
    );
    btnBusqueda.addEventListener("click", () =>
      correr("/api/busqueda", renderBusqueda, "Buscando tus postulaciones…")
    );
    btnRecordatorios.addEventListener("click", cargarRecordatorios);
    btnReintentar.addEventListener("click", () => ultimaAccion && ultimaAccion());
  </script>
</body>
</html>
